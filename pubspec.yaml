name: compara_sites_mobile
description: A European price comparator for Decathlon and Zara.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  html: ^0.15.4
  url_launcher: ^6.2.0
  provider: ^6.1.1
  google_fonts: ^6.1.0
  
  # New dependencies
  shared_preferences: ^2.2.2
  webview_flutter: ^4.7.0
  share_plus: ^9.0.0
  dio: ^5.4.1
  intl: ^0.20.2
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.10
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"

flutter_native_splash:
  color: "#051024"
  image: "assets/images/splash_logo.png"
  branding: "assets/images/splash_logo.png"
  color_dark: "#051024"
  image_dark: "assets/images/splash_logo.png"
  branding_dark: "assets/images/splash_logo.png"
  android_12:
    image: "assets/images/splash_logo.png"
    icon_background_color: "#051024"
    image_dark: "assets/images/splash_logo.png"
    icon_background_color_dark: "#051024"
  fullscreen: true


flutter:
  uses-material-design: true
